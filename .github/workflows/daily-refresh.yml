name: Daily Snapshot Refresh

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh snapshot and rebuild static site
        run: |
          npm run snapshot:daily
          npm run build:static

      - name: Commit updated data and build output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily World Cup snapshot refresh"
          file_pattern: public/data/*.json src/data/*.json public/worldcup2026_odds.csv
